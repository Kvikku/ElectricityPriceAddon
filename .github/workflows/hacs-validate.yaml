name: HACS Validation

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  hacs:
    name: Validate for HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
