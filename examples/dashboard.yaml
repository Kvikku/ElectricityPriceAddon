# ─────────────────────────────────────────────────────────────
# Example Home Assistant Dashboard — Norway Electricity Prices
# Region: NO3 (Trondheim / Midt-Norge)
# ─────────────────────────────────────────────────────────────
#
# Prerequisites:
#   - Norway Electricity Prices integration configured for NO3
#   - apexcharts-card installed via HACS
#     https://github.com/RomRider/apexcharts-card
#
# Usage:
#   1. In HA go to Settings → Dashboards → Add Dashboard
#   2. Open the new dashboard, click ⋮ → Edit Dashboard → Raw configuration editor
#   3. Paste the contents below and save
#
# To use a different region, replace every occurrence of "no3"
# with your area code (no1, no2, no4, or no5).
# ─────────────────────────────────────────────────────────────

views:
  - title: Electricity Prices
    path: electricity
    icon: mdi:flash
    cards:
      # ── Row 1: Current price gauge + price level ────────────
      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.electricity_price_no3
            name: Current Price
            unit: NOK/kWh
            needle: true
            min: 0
            max: 5
            segments:
              - from: 0
                color: "#4CAF50"
              - from: 0.5
                color: "#8BC34A"
              - from: 1.0
                color: "#FFC107"
              - from: 2.0
                color: "#FF9800"
              - from: 3.0
                color: "#F44336"
          - type: entity
            entity: sensor.price_level_no3
            name: Price Level
            icon: mdi:speedometer

      # ── Row 2: Current vs Next hour ─────────────────────────
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.electricity_price_no3
            name: Current Price
            icon: mdi:flash
          - type: entity
            entity: sensor.next_hour_price_no3
            name: Next Hour
            icon: mdi:flash-outline
          - type: markdown
            title: Current vs Average
            content: |
              {% set current = states('sensor.electricity_price_no3') | float(0) %}
              {% set avg = states('sensor.average_price_no3') | float(0) %}
              {% set diff = current - avg %}
              {% if diff > 0.01 %}
              🔴 **{{ diff | round(2) }}** above avg
              {% elif diff < -0.01 %}
              🟢 **{{ (diff | abs) | round(2) }}** below avg
              {% else %}
              🟡 At average
              {% endif %}
              (avg: {{ avg | round(2) }} NOK/kWh)

      # ── Row 3: Daily statistics ─────────────────────────────
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.average_price_no3
            name: Today Avg
            icon: mdi:chart-line
          - type: entity
            entity: sensor.min_price_no3
            name: Today Min
            icon: mdi:arrow-down-bold
          - type: entity
            entity: sensor.max_price_no3
            name: Today Max
            icon: mdi:arrow-up-bold

      # ── Row 4: Cheap / Expensive indicator ──────────────────
      - type: horizontal-stack
        cards:
          - type: entity
            entity: binary_sensor.cheapest_hours_no3
            name: Cheap Hour Now?
            icon: mdi:cash-minus
          - type: entity
            entity: binary_sensor.expensive_hours_no3
            name: Expensive Hour Now?
            icon: mdi:cash-plus

      # ── Color-coded hourly price chart — Today ──────────────
      - type: custom:apexcharts-card
        header:
          title: Today's Electricity Prices — NO3
          show: true
        graph_span: 24h
        span:
          start: day
        now:
          show: true
          label: Now
        yaxis:
          - min: 0
            apex_config:
              forceNiceScale: true
        apex_config:
          chart:
            height: 300
          tooltip:
            y:
              formatter: |
                EVAL:function(value) {
                  return value.toFixed(2) + ' NOK/kWh';
                }
        series:
          - entity: sensor.electricity_price_no3
            data_generator: |
              const data = entity.attributes.raw_today || [];
              return data.map(e => [new Date(e.start).getTime(), e.price]);
            type: column
            name: Price
            color_threshold:
              - value: 0
                color: "#4CAF50"
              - value: 0.5
                color: "#8BC34A"
              - value: 1.0
                color: "#FFC107"
              - value: 2.0
                color: "#FF9800"
              - value: 3.0
                color: "#F44336"
          - entity: sensor.average_price_no3
            name: Average
            type: line
            color: "#9E9E9E"
            stroke_width: 2
            extend_to: end
            group_by:
              func: raw
              duration: 1h

      # ── Hourly price chart — Today + Tomorrow ───────────────
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.electricity_price_no3
            state_not: unavailable
        card:
          type: custom:apexcharts-card
          header:
            title: Electricity Prices — Today + Tomorrow
            show: true
          graph_span: 48h
          span:
            start: day
          now:
            show: true
            label: Now
          yaxis:
            - min: 0
              apex_config:
                forceNiceScale: true
          apex_config:
            chart:
              height: 300
            tooltip:
              y:
                formatter: |
                  EVAL:function(value) {
                    return value.toFixed(2) + ' NOK/kWh';
                  }
          series:
            - entity: sensor.electricity_price_no3
              data_generator: |
                const today = entity.attributes.raw_today || [];
                const tomorrow = entity.attributes.raw_tomorrow || [];
                // Hide the chart entirely until tomorrow's data is published
                if (tomorrow.length === 0) return [];
                const all = [...today, ...tomorrow];
                return all.map(e => [new Date(e.start).getTime(), e.price]);
              type: column
              name: Price
              color_threshold:
                - value: 0
                  color: "#42A5F5"
                - value: 0.5
                  color: "#66BB6A"
                - value: 1.0
                  color: "#FFA726"
                - value: 2.0
                  color: "#FF7043"
                - value: 3.0
                  color: "#EF5350"

      # ── Best consecutive charging window ────────────────────
      - type: markdown
        title: "⚡ Best Charging Window"
        content: |
          {% set w = state_attr('binary_sensor.cheapest_hours_no3',
          'best_consecutive_window') %}
          {% if w %}
          🕐 **{{ w.start | as_datetime | as_local
              | string | truncate(16, True, '') }}** →
             **{{ w.end | as_datetime | as_local
              | string | truncate(16, True, '') }}**
          💰 Avg price: **{{ w.average_price | round(3) }}** NOK/kWh

          | Hour | Price (NOK/kWh) |
          |:----:|:---------------:|
          {% for h in w.hours -%}
          | {{ '%02d' | format(h.hour) }}:00 | {{ h.price | round(3) }} |
          {% endfor %}
          {% else %}
          _No data available yet._
          {% endif %}

      # ── Cheapest & Expensive hours side-by-side ─────────────
      - type: horizontal-stack
        cards:
          - type: markdown
            title: "🟢 Today's Cheapest Hours"
            content: |
              {% set hours = state_attr('binary_sensor.cheapest_hours_no3',
              'cheapest_hours') %}
              {% if hours %}
              | Hour | Price (NOK/kWh) |
              |:----:|:---------------:|
              {% for h in hours -%}
              | {{ '%02d' | format(h.hour) }}:00 | {{ h.price | round(3) }} |
              {% endfor %}
              {% else %}
              _No data available yet._
              {% endif %}
          - type: markdown
            title: "🔴 Today's Most Expensive"
            content: |
              {% set hours = state_attr('binary_sensor.expensive_hours_no3',
              'expensive_hours') %}
              {% if hours %}
              | Hour | Price (NOK/kWh) |
              |:----:|:---------------:|
              {% for h in hours -%}
              | {{ '%02d' | format(h.hour) }}:00 | {{ h.price | round(3) }} |
              {% endfor %}
              {% else %}
              _No data available yet._
              {% endif %}

      # ── All entities overview ───────────────────────────────
      - type: entities
        title: All Sensors
        show_header_toggle: false
        entities:
          - entity: sensor.electricity_price_no3
            name: Current Price
          - entity: sensor.next_hour_price_no3
            name: Next Hour
          - entity: sensor.average_price_no3
            name: Today's Average
          - entity: sensor.min_price_no3
            name: Today's Cheapest
          - entity: sensor.max_price_no3
            name: Today's Most Expensive
          - entity: sensor.price_level_no3
            name: Price Level
          - type: divider
          - entity: binary_sensor.cheapest_hours_no3
            name: Cheap Now?
          - entity: binary_sensor.expensive_hours_no3
            name: Expensive Now?
