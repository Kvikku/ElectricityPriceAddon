name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Home Assistant for hassfest
        run: pip install homeassistant

      - name: Run hassfest
        run: python -m script.hassfest --action validate --integration-path custom_components/norway_electricity

  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest aiohttp

      - name: Run tests
        run: pytest

  release:
    name: Create GitHub Release
    needs: [validate, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
